# Button
CONFIG_GPIO=y
CONFIG_INPUT=y

# LED
CONFIG_LED=y
CONFIG_PWM=y
CONFIG_LED_PWM=y

# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SAP"
CONFIG_BT_DEVICE_APPEARANCE=1362

# Sensor
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_RTIO=y

CONFIG_BME280=y
CONFIG_VEML7700=y

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y

CONFIG_LOG=y
CONFIG_CBPRINTF_FP_SUPPORT=y


# Enable for verbose output
# CONFIG_I2C_LOG_LEVEL_DBG=y

# CONFIG_SHELL=y

# Required for i2c scan
# CONFIG_I2C_SHELL=y

# Required for sensor get
# CONFIG_SENSOR_SHELL=y